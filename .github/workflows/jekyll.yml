# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        # https://github.com/ruby/setup-ruby/releases/tag/v1.207.0
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically -- EXCEPT IT DOESNT KNOW WHERE GEMFILE IS!
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Try bundle install again
        run: bundle install --gemfile=/home/runner/work/formulize/formulize/docs/Gemfile
      - name: Fetch roadmap data from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="https://api.github.com/repos/jegelstaff/formulize"
          DATADIR="/home/runner/work/formulize/formulize/docs/_data"
          ISSUE_FIELDS='{number: .number, title: .title, body: .body, html_url: .html_url}'

          api_get() {
            curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$1"
          }

          # Milestone API numbers: 8.2=8, 8.3=12, 9.0=7, 9.1=10
          for MS_NUM in 8 12 7 10; do
            api_get "$BASE/milestones/$MS_NUM" > "/tmp/ms_${MS_NUM}.json"
            api_get "$BASE/issues?labels=Marquee+Feature&milestone=${MS_NUM}&state=open&per_page=50" \
              | jq "[.[] | $ISSUE_FIELDS]" > "/tmp/open_${MS_NUM}.json"
            api_get "$BASE/issues?labels=Marquee+Feature&milestone=${MS_NUM}&state=closed&per_page=50" \
              | jq "[.[] | $ISSUE_FIELDS]" > "/tmp/done_${MS_NUM}.json"
          done

          jq -n \
            --slurpfile ms8   /tmp/ms_8.json   --slurpfile open8   /tmp/open_8.json   --slurpfile done8   /tmp/done_8.json \
            --slurpfile ms12  /tmp/ms_12.json  --slurpfile open12  /tmp/open_12.json  --slurpfile done12  /tmp/done_12.json \
            --slurpfile ms7   /tmp/ms_7.json   --slurpfile open7   /tmp/open_7.json   --slurpfile done7   /tmp/done_7.json \
            --slurpfile ms10  /tmp/ms_10.json  --slurpfile open10  /tmp/open_10.json  --slurpfile done10  /tmp/done_10.json \
            '[
              {key: "v82",  version: "8.2", milestone: $ms8[0],  open: $open8[0],  done: $done8[0]},
              {key: "v83",  version: "8.3", milestone: $ms12[0], open: $open12[0], done: $done12[0]},
              {key: "v90",  version: "9.0", milestone: $ms7[0],  open: $open7[0],  done: $done7[0]},
              {key: "v91",  version: "9.1", milestone: $ms10[0], open: $open10[0], done: $done10[0]}
            ]' > "$DATADIR/roadmap_issues.json"
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        working-directory: /home/runner/work/formulize/formulize/docs
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3
        with:
          path: /home/runner/work/formulize/formulize/docs/_site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
