<div class="panel-content content">

<form id="form-<{$number}>" class="formulize-admin-form">
<input type="hidden" name="formulize_admin_handler" value="element_options">
<input type="hidden" name="formulize_admin_key" value="<{$content.ele_id}>">
<input type="hidden" name="reload_option_page" value="">
<input type="hidden" class="optionsconditionsdelete" name="optionsconditionsdelete" value="">
<input type="hidden" class="optionsLimitByElementFilterDelete" name="optionsLimitByElementFilterDelete" value="">


<{include file=$content.typetemplate}>

<{if $content.apply_default_empty_count > 0}>
<div style="margin-top: 15px; padding: 10px; border-top: 1px solid #ccc;">
  <label>
    <input type="checkbox" name="apply_default_to_empty" value="1">
    Apply this default value to <{$content.apply_default_empty_count}> existing <{if $content.apply_default_empty_count == 1}>entry<{else}>entries<{/if}> that currently have no value for this element
  </label>
</div>
<{/if}>

</form>

</div> <!--// end content -->
