<div class="panel-content content">
    <fieldset>
        <legend><{$smarty.const._AM_formulize_TIME_DEFAULT_TIME}></legend>
        <div class="form-item">
            <input type="text" id="element-time" name="elements-ele_value[0]" value="<{$content.ele_value[0]}>" size="15" />
        </div>
		<{include file="db:admin/element_apply_default_to_empty.html"}>
    </fieldset>
	<div class="description">
		<p><{$smarty.const._AM_formulize_TIME_DEFAULT_DESC}></p>
	</div>
    <fieldset>
        <legend><{$smarty.const._AM_formulize_TIME_DISPLAY_FORMAT}></legend>
        <div class="form-item">
            <label><input type="radio" name="elements-ele_value[1]" value="12" <{if $content.effective_time_format eq "12"}> checked="checked"<{/if}> /> <{$smarty.const._AM_formulize_TIME_FORMAT_12}></label><br>
            <label><input type="radio" name="elements-ele_value[1]" value="24" <{if $content.effective_time_format eq "24"}> checked="checked"<{/if}> /> <{$smarty.const._AM_formulize_TIME_FORMAT_24}></label>
        </div>
    </fieldset>
</div>
